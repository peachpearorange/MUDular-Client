name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: mudular-linux-x86_64
            binary: mudular
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: mudular-windows-x86_64.exe
            binary: mudular.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            name: mudular-macos-aarch64
            binary: mudular
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libwayland-dev libgl-dev libegl-dev libfontconfig1-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Set NDK environment
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Build native library
        run: cargo ndk -t arm64-v8a -o android/app/src/main/jniLibs build --lib --release

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: android
        run: gradle assembleRelease || gradle assembleDebug

      - name: Find APK
        id: find-apk
        run: |
          APK=$(find android/app/build/outputs/apk -name '*.apk' | head -1)
          cp "$APK" mudular-android-arm64.apk
          echo "found=$APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mudular-android-arm64.apk
          path: mudular-android-arm64.apk

  release:
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mudular-linux-x86_64
            artifacts/mudular-windows-x86_64.exe
            artifacts/mudular-macos-aarch64
            artifacts/mudular-android-arm64.apk
          generate_release_notes: true
