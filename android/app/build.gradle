apply plugin: 'com.android.application'

android {
    namespace 'com.mudular.client'
    compileSdk 34

    defaultConfig {
        applicationId "com.mudular.client"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "0.1.3"
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ["src/main/jniLibs"]
        }
    }
}
